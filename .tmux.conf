set -g prefix C-a
unbind C-b
bind C-a send-prefix

# split panes using | and _
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi
set -s escape-time 10
set -g set-clipboard on
set -g renumber-windows on
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"

# New windows in current pane working directory.
bind c new-window -c "#{pane_current_path}"

# Prefix + h/j/k/l for pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Prefix + H/J/K/L for pane resize.
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Copy mode: visual selection and portable clipboard copy.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
if-shell 'command -v xclip >/dev/null 2>&1' 'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"'
if-shell 'command -v wl-copy >/dev/null 2>&1' 'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"'
if-shell 'command -v pbcopy >/dev/null 2>&1' 'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'

